
global:
  imageRegistry: "ghcr.io/popugaichik1"
  imagePullSecrets: []
  # Managed Service for Kafka в Timeweb Cloud — не самохостится этим чартом.
  # Подставьте реальный адрес брокеров после создания инстанса в панели
  # Timeweb (Network > Managed Kafka). Если сервис требует SASL/TLS —
  # это нужно будет добавить отдельно в core_kafka.ProducerConfig/ConsumerConfig
  # сервисов (сейчас там только bootstrap.servers, без аутентификации).
  kafkaBrokers: "194.87.187.37:9092"
  kafka:
    sasl:
      enable: false
      mechanism: "SCRAM-SHA-512"
  postgresImage: "postgres:18.1-bookworm"
  secretsManagedExternally: false

ingress:
  enabled: true
  className: "nginx"
  host: "auto-platform.example.com"
  tls:
    enabled: false
    secretName: ""


redis:
  enabled: true
  image: "redis:7.4-alpine"
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 100m, memory: 128Mi }

services:
  auth:
    image:
      repository: auth-service
      tag: "latest"
      pullPolicy: IfNotPresent
    replicaCount: 3
    containerPort: 5050
    routePath: /api/auth
    # сюда идёт nginx auth_request на каждый запрос к этим путям (см. ingress.yaml)
    protectedPaths:
      - /api/auth/authorized
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 250m, memory: 256Mi }
    env:
      HTTP_SHUTDOWN_TIMEOUT: "30s"
      HTTP_ALLOWED_ORIGINS: "https://auto-platform-nine.vercel.app"
      ACCESS_TOKEN_EXPIRY: "15m"
      REFRESH_TOKEN_EXPIRY: "168h"
      LOGGER_LEVEL: "DEBUG"
      LOGGER_FOLDER: ""
      TIME_ZONE: "UTC"
      POSTGRES_PORT: "5432"
      POSTGRES_TIMEOUT: "5s"
    secretEnv:
      JWT_SECRET: "CHANGE_ME"
    postgres:
      enabled: true
      external: false     
      host: ""            
      sslMode: "disable"   
      database: auth_db
      username: gen_user

  listing:
    image:
      repository: listing-service
      tag: "latest"
      pullPolicy: IfNotPresent
    replicaCount: 3
    containerPort: 6060
    grpcPort: 6061
    routePath: /api/listings
    protectedPaths:
      - /api/listings/mine
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 250m, memory: 256Mi }
    env:
      HTTP_SHUTDOWN_TIMEOUT: "30s"
      HTTP_ALLOWED_ORIGINS: "https://auto-platform-nine.vercel.app"
      LOGGER_LEVEL: "DEBUG"
      LOGGER_FOLDER: ""
      TIME_ZONE: "UTC"
      POSTGRES_PORT: "5432"
      POSTGRES_TIMEOUT: "10s"
      GRPC_ADDR: ":6061"
    redis:
      enabled: true
      port: "6379"
      timeout: "2s"
    postgres:
      enabled: true
      external: false     
      host: ""            
      sslMode: "disable"   
      database: listing_db
      username: gen_user

  user:
    image:
      repository: user-service
      tag: "latest"
      pullPolicy: IfNotPresent
    replicaCount: 3
    containerPort: 5050
    routePath: /api/user
    protectedPaths:
      - /api/user/me
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 250m, memory: 256Mi }
    env:
      HTTP_SHUTDOWN_TIMEOUT: "30s"
      HTTP_ALLOWED_ORIGINS: "https://auto-platform-nine.vercel.app"
      LOGGER_LEVEL: "DEBUG"
      LOGGER_FOLDER: ""
      TIME_ZONE: "UTC"
      POSTGRES_PORT: "5432"
      POSTGRES_TIMEOUT: "10s"
    postgres:
      enabled: true
      external: false     
      host: ""            
      sslMode: "disable"   
      database: user_db
      username: gen_user

  messenger:
    image:
      repository: messenger-service
      tag: "latest"
      pullPolicy: IfNotPresent
    replicaCount: 3
    containerPort: 7070
    routePath: /api/messenger
    protectedPaths:
      - /api/messenger/mine
      - /api/messenger/ws
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 250m, memory: 256Mi }
    env:
      HTTP_SHUTDOWN_TIMEOUT: "30s"
      HTTP_ALLOWED_ORIGINS: "https://auto-platform-nine.vercel.app"
      LOGGER_LEVEL: "DEBUG"
      LOGGER_FOLDER: ""
      TIME_ZONE: "UTC"
      POSTGRES_PORT: "5432"
      POSTGRES_TIMEOUT: "10s"
    # включает инъекцию LISTING_GRPC_ADDR в app.yaml — единственный
    # синхронный поход в другой сервис (узнать продавца при создании треда, gRPC)
    callsListingService: true
    postgres:
      enabled: true
      external: false     
      host: ""            
      sslMode: "disable"   
      database: messenger_db  
      username: gen_user

  storage:
    image:
      repository: storage-service
      tag: "latest"
      pullPolicy: IfNotPresent
    replicaCount: 2
    containerPort: 7080
    routePath: /api/storage
    # выдача presigned URL — единственная защищённая операция
    protectedPaths:
      - /api/storage/mine
    resources:
      requests: { cpu: 25m, memory: 32Mi }
      limits: { cpu: 100m, memory: 64Mi }
    env:
      HTTP_SHUTDOWN_TIMEOUT: "30s"
      LOGGER_LEVEL: "DEBUG"
      LOGGER_FOLDER: ""
      TIME_ZONE: "UTC"
      # S3-совместимое Object Storage в Timeweb Cloud — не самохостится этим
      # чартом (как и global.kafkaBrokers). Подставьте реальные значения
      # после создания bucket'а в панели Timeweb (Cloud Storage > S3) —
      # endpoint и регион там же, ключи доступа генерируются при создании.
      HTTP_ALLOWED_ORIGINS: "https://auto-platform-nine.vercel.app"
      S3_ENDPOINT: "https://s3.twcstorage.ru"
      S3_REGION: "ru-1"
      S3_BUCKET: "19aaa283-acf2-4cef-a707-a5432c42a031"
    secretEnv:
      S3_ACCESS_KEY: "CHANGE_ME"
      S3_SECRET_KEY: "CHANGE_ME"
    # без своей БД — сервис только подписывает presigned-ссылки, ничего не хранит
    postgres:
      enabled: false

frontend:
  enabled: true
  image:
    repository: frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 100m, memory: 64Mi }