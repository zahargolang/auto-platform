{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: auto-platform
  {{- if .Values.ingress.tls.enabled }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- range $key, $svc := .Values.services }}
          - path: {{ $svc.routePath }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "auto-platform.appName" (dict "root" $ "key" $key) }}
                port:
                  number: 80
          {{- end }}
          {{- if .Values.frontend.enabled }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend
                port:
                  number: 80
          {{- end }}
---
{{- $hasProtected := false }}
{{- range $key, $svc := .Values.services }}
  {{- if $svc.protectedPaths }}
    {{- $hasProtected = true }}
  {{- end }}
{{- end }}
{{- if $hasProtected }}
# Защищённые пути отдельным Ingress-объектом: nginx.ingress.kubernetes.io/auth-url
# применяется на уровне всего Ingress, а не отдельного path, поэтому публичные
# (см. выше) и защищённые пути нельзя смешивать в одном объекте. ingress-nginx
# сам выбирает более специфичный path при совпадении (например
# /api/listings/mine "перекрывает" /api/listings), так что порядок Ingress'ов
# не важен.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-protected
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: auto-platform
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "http://{{ include "auto-platform.appName" (dict "root" $ "key" "auth") }}.{{ .Release.Namespace }}.svc.cluster.local/api/auth/validate"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-User-Id"
    # CORS preflight (OPTIONS) не несёт Authorization заголовка — браузер так не делает.
    # configuration-snippet выполняется в rewrite-фазе nginx, которая идёт РАНЬШЕ
    # access-фазы где работает auth_request. Поэтому OPTIONS завершается здесь
    # с нужными CORS-заголовками, не доходя до auth-service.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- range $key, $svc := .Values.services }}
          {{- range $path := $svc.protectedPaths }}
          - path: {{ $path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "auto-platform.appName" (dict "root" $ "key" $key) }}
                port:
                  number: 80
          {{- end }}
          {{- end }}
{{- end }}
{{- end }}
