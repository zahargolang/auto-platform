name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # ОПРЕДЕЛЯЕМ, КАКИЕ СЕРВИСЫ РЕАЛЬНО ИЗМЕНИЛИСЬ
  # ─────────────────────────────────────────
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      listing: ${{ steps.filter.outputs.listing }}
      user: ${{ steps.filter.outputs.user }}
      messenger: ${{ steps.filter.outputs.messenger }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'auth-service/**'
            listing:
              - 'listing-service/**'
            user:
              - 'user-service/**'
            messenger:
              - 'messenger-service/**'
            frontend:
              - 'frontend/**'
  # ─────────────────────────────────────────
  # AUTH SERVICE
  # ─────────────────────────────────────────
  auth-service:
    name: auth-service
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: auth-service

    steps:
      #клонируем код на нашу машину
      - name: Checkout
        uses: actions/checkout@v4

      #устанавливает go на ВМ
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: auth-service/go.sum

      - name: Install librdkafka
        run: sudo apt-get install -y librdkafka-dev

      #компилирует  весь код сервиса
      - name: Build
        run: go build ./...

      #запускает unit-тесты сервиса
      - name: Test
        run: go test ./... -cover

      #запускает агрегатор линтера для go
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: auth-service

      #билдит образ сервиса, тег = SHA коммита — неизменяемый, в отличие от latest
      - name: Docker build
        run: docker build -f cmd/Dockerfile -t ghcr.io/popugaichik1/auth-service:${{ github.sha }} .

      #пушим только при реальном push в main, не на каждый PR
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        run: docker push ghcr.io/popugaichik1/auth-service:${{ github.sha }}
  # ────────────────────────────────────────
  # USER SERVICE
  # ─────────────────────────────────────────
  user-service:
    name: user-service
    needs: detect-changes
    if: needs.detect-changes.outputs.user == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: user-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: user-service/go.sum

      - name: Install librdkafka
        run: sudo apt-get install -y librdkafka-dev

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -cover

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: user-service

      - name: Docker build
        run: docker build -f cmd/Dockerfile -t ghcr.io/popugaichik1/user-service:${{ github.sha }} .

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        run: docker push ghcr.io/popugaichik1/user-service:${{ github.sha }}
# ─────────────────────────────────────────
# LISTING SERVICE.
# ─────────────────────────────────────────
  listing-service:
    name: listing-service
    needs: detect-changes
    if: needs.detect-changes.outputs.listing == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: listing-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: listing-service/go.sum

      - name: Install librdkafka
        run: sudo apt-get install -y librdkafka-dev

      - name: Build
        run: go build ./...

      #тестирует сервис
      - name: Test
        run: go test ./... -cover

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: listing-service

      - name: Docker build
        run: docker build -f cmd/Dockerfile -t ghcr.io/popugaichik1/listing-service:${{ github.sha }} .

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        run: docker push ghcr.io/popugaichik1/listing-service:${{ github.sha }}
# ─────────────────────────────────────────
# MESSENGER SERVICE
# ─────────────────────────────────────────
  messenger-service:
    name: messenger-service
    needs: detect-changes
    if: needs.detect-changes.outputs.messenger == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: messenger-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: messenger-service/go.sum

      - name: Install librdkafka
        run: sudo apt-get install -y librdkafka-dev

      - name: Build
        run: go build ./...

      #тестирует сервис
      - name: Test
        run: go test ./... -cover

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: messenger-service

      - name: Docker build
        run: docker build -f cmd/Dockerfile -t ghcr.io/popugaichik1/messenger-service:${{ github.sha }} .

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        run: docker push ghcr.io/popugaichik1/messenger-service:${{ github.sha }}
# ─────────────────────────────────────────
# FRONTEND.
# ─────────────────────────────────────────
  frontend:
    name: frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      #tsc -b (тайпчек) + vite build.
      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Docker build
        run: docker build -f Dockerfile -t ghcr.io/popugaichik1/frontend:${{ github.sha }} .

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        run: docker push ghcr.io/popugaichik1/frontend:${{ github.sha }}
# ─────────────────────────────────────────
# STORAGE SERVICE
# ─────────────────────────────────────────
  storage-service:
    name: storage-service
    needs: detect-changes
    if: needs.detect-changes.outputs.storage == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: storage-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: storage-service/go.sum

      # без librdkafka — сервис не использует Kafka, CGO_ENABLED=0

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -cover

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: storage-service

      - name: Docker build
        run: docker build -f cmd/Dockerfile -t ghcr.io/popugaichik1/storage-service:${{ github.sha }} .

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        run: docker push ghcr.io/popugaichik1/storage-service:${{ github.sha }}
# ─────────────────────────────────────────
# DEPLOY (GitOps): обновляет теги образов в values-production.yaml.
# Сам helm upgrade здесь не делаем — ArgoCD сам подхватит этот коммит
# из git и применит к кластеру (pull-модель, а не push).
# ─────────────────────────────────────────
  deploy:
    name: deploy
    needs: [auth-service, listing-service, user-service, messenger-service, storage-service, frontend]
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      #обновляем тег только тем сервисам, чья джоба реально собралась и
      #запушилась (success) — пропущенные (skipped, нет изменений) и
      #упавшие (failure) не трогаем
      - name: Update image tags for changed services
        id: update
        run: |
          set -e
          CHANGED=0
          declare -A RESULTS=(
            [auth]="${{ needs.auth-service.result }}"
            [listing]="${{ needs.listing-service.result }}"
            [user]="${{ needs.user-service.result }}"
            [messenger]="${{ needs.messenger-service.result }}"
            [storage]="${{ needs.storage-service.result }}"
          )
          for key in "${!RESULTS[@]}"; do
            if [ "${RESULTS[$key]}" = "success" ]; then
              yq -i ".services.${key}.image.tag = \"${{ github.sha }}\"" helm/auto-platform/values-production.yaml
              CHANGED=1
            fi
          done
          if [ "${{ needs.frontend.result }}" = "success" ]; then
            yq -i ".frontend.image.tag = \"${{ github.sha }}\"" helm/auto-platform/values-production.yaml
            CHANGED=1
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.update.outputs.changed == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/auto-platform/values-production.yaml
          git commit -m "Deploy: update image tags to ${{ github.sha }} [skip ci]"
          git push