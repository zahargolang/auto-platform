server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        default_type text/plain;
        return 200 "ok";
    }

    # SPA: всё, что не статический файл, отдаём index.html — роутинг
    # делает react-router на клиенте
    location / {
        try_files $uri $uri/ /index.html;
    }
}